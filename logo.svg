<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800');
  </style>
  <defs>
    <linearGradient id="pillar-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="pillar-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="word-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.95)"/>
    </linearGradient>
  </defs>

  <!-- ═══ MARK ═══ -->

  <!-- Left pillar — purple, modest height -->
  <rect x="8" y="24" width="14" height="72" rx="4" fill="url(#pillar-l)"/>

  <!-- Right pillar — gold, taller (ambition, forward lean) -->
  <rect x="58" y="14" width="14" height="82" rx="4" fill="url(#pillar-r)"/>

  <!-- Arrow crossbar — connects the two pillars, points henceward -->
  <line x1="22" y1="60" x2="52" y2="60" stroke="url(#arrow-grad)" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="46,52 54,60 46,68" fill="none" stroke="url(#arrow-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle connector dots at pillar base — ground the mark -->
  <circle cx="15" cy="103" r="2.5" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="65" cy="103" r="2.5" fill="#F59E0B" opacity="0.5"/>

  <!-- ═══ DIVIDER ═══ -->
  <line x1="104" y1="28" x2="104" y2="92" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- ═══ WORDMARK ═══ -->
  <text
    x="122"
    y="72"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="5"
    fill="url(#word-grad)"
  >HENCEWARD</text>

  <!-- ═══ TAGLINE ═══ -->
  <text
    x="123"
    y="91"
    font-family="'Syne', 'Arial', sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="4"
    fill="rgba(156,163,175,0.7)"
  >FROM HERE · FORWARD</text>
</svg>
